# Traefik file provider — routes HTTP on entrypoint `web` (container :80) to the API.
# Use Host `api.localhost` and map it to 127.0.0.1 in /etc/hosts, or pass the header when testing:
#   curl -H "Host: api.localhost" http://127.0.0.1:${TRAEFIK_HTTP_PORT:-9080}/health
http:
  routers:
    chexi-api:
      rule: Host(`api.localhost`)
      entryPoints:
        - web
      service: chexi-api
  services:
    chexi-api:
      loadBalancer:
        servers:
          - url: http://chexi-api:8080
