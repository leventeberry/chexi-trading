# Optional: publish API and admin web on the host (bypass Traefik for HTTP).
# Use when you need http://127.0.0.1:8080 / :5174 (e.g. scripts, CI, or dev-local-api).
#
#   docker compose --env-file .env \
#     -f infra/docker/docker-compose.yml \
#     -f infra/docker/docker-compose.dev.yml \
#     -f infra/docker/docker-compose.direct-http.yml up -d

services:
  chexi-api:
    ports:
      - "${API_PUBLISH_HOST:-127.0.0.1}:${API_PUBLISH_PORT:-8080}:8080"

  chexi-web:
    ports:
      - "${WEB_PUBLISH_HOST:-127.0.0.1}:${WEB_PUBLISH_PORT:-5174}:80"
