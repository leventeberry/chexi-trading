# Optional edge proxy (dev): routes api.localhost → chexi-api:8080 on the Compose network.
#
#   docker compose --env-file .env \
#     -f infra/docker/docker-compose.yml \
#     -f infra/docker/docker-compose.dev.yml \
#     -f infra/docker/docker-compose.traefik.yml up -d
#
# Or: make docker-up-traefik
#
# Add to /etc/hosts: 127.0.0.1 api.localhost
# HTTP entrypoint: http://api.localhost:${TRAEFIK_HTTP_PORT:-9080}
# Dashboard (insecure, dev only): http://127.0.0.1:${TRAEFIK_DASHBOARD_PORT:-9081}/dashboard/

services:
  chexi-traefik:
    image: traefik:v3.6.5
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --entrypoints.web.address=:80
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --log.level=INFO
    ports:
      - "${TRAEFIK_PUBLISH_HOST:-127.0.0.1}:${TRAEFIK_HTTP_PORT:-9080}:80"
      - "${TRAEFIK_PUBLISH_HOST:-127.0.0.1}:${TRAEFIK_DASHBOARD_PORT:-9081}:8080"
    volumes:
      - ../traefik/dynamic:/etc/traefik/dynamic:ro
    depends_on:
      chexi-api:
        condition: service_started
    networks:
      - chexi_trading_network
    security_opt:
      - no-new-privileges:true
