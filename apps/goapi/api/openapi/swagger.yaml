basePath: /
definitions:
  handlers.AcceptOrgInvitationRequest:
    properties:
      token:
        type: string
    required:
    - token
    type: object
  handlers.ClientEventInput:
    properties:
      event_type:
        type: string
      metadata:
        additionalProperties: true
        type: object
      subject:
        type: string
    required:
    - event_type
    type: object
  handlers.CreateOrgInvitationRequest:
    properties:
      email:
        type: string
      role:
        enum:
        - admin
        - member
        type: string
    required:
    - email
    - role
    type: object
  handlers.CreateOrganizationNoteRequest:
    properties:
      body:
        minLength: 1
        type: string
      title:
        maxLength: 255
        minLength: 1
        type: string
    required:
    - body
    - title
    type: object
  handlers.CreateOrganizationRequest:
    properties:
      name:
        maxLength: 255
        minLength: 1
        type: string
      slug:
        maxLength: 128
        type: string
    required:
    - name
    type: object
  handlers.CreateUserInput:
    properties:
      email:
        maxLength: 255
        type: string
      first_name:
        maxLength: 50
        minLength: 1
        type: string
      last_name:
        maxLength: 50
        minLength: 1
        type: string
      password:
        maxLength: 128
        minLength: 8
        type: string
      phone_number:
        maxLength: 20
        type: string
      role:
        description: Role defaults to user; only an admin JWT may set admin.
        enum:
        - user
        - admin
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    type: object
  handlers.MeProfileResponse:
    properties:
      profile:
        $ref: '#/definitions/handlers.UserResponse'
      settings:
        $ref: '#/definitions/handlers.MeSettingsResponse'
    type: object
  handlers.MeSettingsResponse:
    properties:
      extra_settings:
        type: object
      marketing_email_opt_in:
        type: boolean
      notification_preferences:
        type: object
      security_notification_opt_in:
        type: boolean
      theme:
        type: string
    type: object
  handlers.PatchMeBody:
    properties:
      profile:
        $ref: '#/definitions/handlers.PatchMeProfileBody'
      settings:
        $ref: '#/definitions/handlers.PatchMeSettingsBody'
    type: object
  handlers.PatchMeProfileBody:
    properties:
      avatar_url:
        type: string
      display_name:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      locale:
        type: string
      phone_number:
        type: string
      timezone:
        type: string
    type: object
  handlers.PatchMeSettingsBody:
    properties:
      extra_settings:
        type: object
      marketing_email_opt_in:
        type: boolean
      notification_preferences:
        type: object
      security_notification_opt_in:
        type: boolean
      theme:
        type: string
    type: object
  handlers.PatchOrganizationRequest:
    properties:
      name:
        maxLength: 255
        minLength: 1
        type: string
      slug:
        maxLength: 128
        type: string
    type: object
  handlers.RequestUserInput:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handlers.SignupUserInput:
    properties:
      email:
        maxLength: 255
        type: string
      first_name:
        maxLength: 50
        minLength: 1
        type: string
      last_name:
        maxLength: 50
        minLength: 1
        type: string
      password:
        maxLength: 128
        minLength: 8
        type: string
      phone_number:
        maxLength: 20
        type: string
      role:
        description: 'Role is ignored for privilege: self-signup is always "user".
          Sending "admin" returns 403.'
        enum:
        - user
        - admin
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    type: object
  handlers.UpdateUserInput:
    properties:
      avatar_url:
        maxLength: 2048
        type: string
      display_name:
        maxLength: 120
        type: string
      email:
        maxLength: 255
        type: string
      first_name:
        maxLength: 50
        minLength: 1
        type: string
      last_name:
        maxLength: 50
        minLength: 1
        type: string
      locale:
        maxLength: 16
        type: string
      password:
        maxLength: 128
        minLength: 8
        type: string
      phone_number:
        maxLength: 20
        type: string
      role:
        description: Setting role to admin requires an admin JWT.
        enum:
        - user
        - admin
        type: string
      timezone:
        maxLength: 64
        type: string
    type: object
  handlers.UserResponse:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      display_name:
        type: string
      email:
        type: string
      email_verified_at:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      locale:
        type: string
      phone_number:
        type: string
      role:
        type: string
      timezone:
        type: string
      updated_at:
        type: string
    type: object
  models.User:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      display_name:
        type: string
      email:
        type: string
      email_verified_at:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      locale:
        type: string
      phone_number:
        type: string
      role:
        type: string
      timezone:
        type: string
      totp_enabled:
        type: boolean
      updated_at:
        type: string
    type: object
  services.OrganizationDTO:
    properties:
      created_at:
        type: string
      created_by_user_id:
        type: string
      id:
        type: string
      name:
        type: string
      slug:
        type: string
      updated_at:
        type: string
    type: object
  services.OrganizationInvitationDTO:
    properties:
      accepted_at:
        type: string
      created_at:
        type: string
      email:
        type: string
      expires_at:
        type: string
      id:
        type: string
      invited_by_user_id:
        type: string
      organization_id:
        type: string
      role:
        type: string
    type: object
  services.OrganizationMemberDTO:
    properties:
      created_at:
        type: string
      organization_id:
        type: string
      role:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  services.OrganizationNoteDTO:
    properties:
      body:
        type: string
      created_at:
        type: string
      created_by_user_id:
        type: string
      id:
        type: string
      organization_id:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: HTTP API for the chexi-trading monorepo (Go/Gin): user management,
    JWT authentication, RBAC, and security/logging middleware. Coinbase ingestion
    and trading-specific routes will layer on this baseline.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: chexi-trading API
  version: "1.0"
paths:
  /admin/users:
    get:
      consumes:
      - application/json
      description: 'Get a list of all users with optional pagination (requires authentication).
        Query parameters: page (default: 1), page_size (default: 10, max: 100)'
      parameters:
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Items per page (default: 10, max: 100)'
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Paginated users response
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid pagination parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get all users
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Create a new user account (admin only)
      parameters:
      - description: User data
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateUserInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created user
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Insufficient privileges (e.g. non-admin assigning admin)
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Email already registered
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create new user
      tags:
      - users
  /admin/users/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a user by ID (requires admin role)
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User deleted successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid user ID
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Insufficient permissions
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: User not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete user
      tags:
      - users
    get:
      consumes:
      - application/json
      description: Get a specific user by their ID (admin only)
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User object
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Invalid user ID
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: User not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get user by ID
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Update user information (admin only; partial updates supported)
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: User update data
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateUserInput'
      produces:
      - application/json
      responses:
        "200":
          description: Updated user
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Insufficient privileges (e.g. non-admin setting admin role)
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: User not found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Email already registered
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update user
      tags:
      - users
  /api/v1/organizations:
    get:
      description: Returns organizations the current user belongs to.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/services.OrganizationDTO'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List my organizations
      tags:
      - organizations
    post:
      consumes:
      - application/json
      description: Creates an organization; the creator becomes owner.
      parameters:
      - description: Organization
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateOrganizationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/services.OrganizationDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create organization
      tags:
      - organizations
  /api/v1/organizations/{id}:
    get:
      description: Returns organization details if the user is a member.
      parameters:
      - description: Organization ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.OrganizationDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get organization
      tags:
      - organizations
    patch:
      consumes:
      - application/json
      description: Owner or admin only.
      parameters:
      - description: Organization ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.PatchOrganizationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.OrganizationDTO'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update organization
      tags:
      - organizations
  /api/v1/organizations/{id}/invitations:
    get:
      description: Owner or admin only
      parameters:
      - description: Organization ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/services.OrganizationInvitationDTO'
            type: array
      security:
      - BearerAuth: []
      summary: List organization invitations
      tags:
      - organizations
    post:
      consumes:
      - application/json
      description: Owner or admin only. Sends email with single-use token.
      parameters:
      - description: Organization ID
        in: path
        name: id
        required: true
        type: string
      - description: Invite
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateOrgInvitationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/services.OrganizationInvitationDTO'
      security:
      - BearerAuth: []
      summary: Create organization invitation
      tags:
      - organizations
  /api/v1/organizations/{id}/members:
    get:
      description: Members of the organization (members-only).
      parameters:
      - description: Organization ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/services.OrganizationMemberDTO'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List organization members
      tags:
      - organizations
  /api/v1/organizations/{id}/members/{userId}:
    delete:
      description: Owner or admin only; cannot remove the last owner.
      parameters:
      - description: Organization ID
        in: path
        name: id
        required: true
        type: string
      - description: Member user ID
        in: path
        name: userId
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Remove organization member
      tags:
      - organizations
  /api/v1/organizations/{id}/notes:
    get:
      parameters:
      - description: Organization ID or slug
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/services.OrganizationNoteDTO'
            type: array
      security:
      - BearerAuth: []
      summary: List organization notes
      tags:
      - organizations
    post:
      consumes:
      - application/json
      description: Members only. Scoped to tenant from route.
      parameters:
      - description: Organization ID or slug
        in: path
        name: id
        required: true
        type: string
      - description: Note
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateOrganizationNoteRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/services.OrganizationNoteDTO'
      security:
      - BearerAuth: []
      summary: Create organization note
      tags:
      - organizations
  /api/v1/organizations/{id}/notes/{noteId}:
    delete:
      description: Owner or admin (tenant role); explicit global-admin bypass may
        apply if configured on route.
      parameters:
      - description: Organization ID or slug
        in: path
        name: id
        required: true
        type: string
      - description: Note ID
        in: path
        name: noteId
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Delete organization note
      tags:
      - organizations
  /api/v1/organizations/invitations/accept:
    post:
      consumes:
      - application/json
      description: Authenticated user; account email must match invite email.
      parameters:
      - description: Token from email
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.AcceptOrgInvitationRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Accept organization invitation
      tags:
      - organizations
  /events:
    get:
      description: Paginated audit and telemetry history. Requires admin JWT.
      parameters:
      - description: Max rows (default 50, max 200)
        in: query
        name: limit
        type: integer
      - description: Offset for pagination
        in: query
        name: offset
        type: integer
      - description: Filter by event_type
        in: query
        name: event_type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: data, total, limit, offset
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List event log
      tags:
      - events
    post:
      consumes:
      - application/json
      description: Inserts a telemetry row into event_log. Requires admin JWT; actor_user_id
        is taken from the token.
      parameters:
      - description: Telemetry payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.ClientEventInput'
      produces:
      - application/json
      responses:
        "202":
          description: recorded
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Record client / UI telemetry event
      tags:
      - events
  /login:
    post:
      consumes:
      - application/json
      description: Authenticate a user with email and password, returns JWT token
      parameters:
      - description: Login credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/handlers.RequestUserInput'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid credentials
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login user
      tags:
      - authentication
  /register:
    post:
      consumes:
      - application/json
      description: Create a new user account (always role user). Self-registration
        as admin is forbidden; admins are created by existing admins via POST /users.
      parameters:
      - description: User registration data
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/handlers.SignupUserInput'
